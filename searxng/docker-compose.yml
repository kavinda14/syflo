# SearXNG für FlowTalk
# ─────────────────────
# Lokale, selbst-gehostete Meta-Suchmaschine. Aggregiert Google, Brave, Bing,
# Wikipedia, GitHub, StackOverflow und ~90 weitere Quellen.
#
# Start:   docker compose -f searxng/docker-compose.yml up -d
# Logs:    docker compose -f searxng/docker-compose.yml logs -f
# Stop:    docker compose -f searxng/docker-compose.yml down
#
# Nach dem Start ist SearXNG unter http://localhost:8890 erreichbar.
# Das FlowTalk-Backend proxiet zu dieser URL — der Container muss laufen,
# damit Web-Suche im Chat funktioniert.

services:
  searxng:
    image: searxng/searxng:latest
    container_name: flowtalk-searxng
    ports:
      - "8890:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
    environment:
      - SEARXNG_BASE_URL=http://localhost:8890/
      - SEARXNG_SECRET=flowtalk-local-dev-secret-change-me-in-prod
    restart: unless-stopped
    # Lokale Nutzung → keine externen Hosts whitelisten nötig.
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"
