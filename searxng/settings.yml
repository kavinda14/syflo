# SearXNG-Settings für FlowTalk
# ─────────────────────────────
# Wichtigste Anpassung gegenüber Default:
#   - formats: [html, json]  → erlaubt /search?format=json, das wir vom
#     FlowTalk-Backend aus aufrufen. Default ist nur "html".
#   - Keine öffentliche Instanz → CORS-Beschränkung locker.

use_default_settings: true

general:
  debug: false
  instance_name: "FlowTalk SearXNG"
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "auto"
  formats:
    - html
    - json
  # Liefert maximal so viele Resultate pro Engine pro Anfrage. Niedriger =
  # schneller, höher = mehr Quellen fürs LLM. 10 ist ein guter Mittelweg.
  max_results: 10

server:
  # Wird durch ENV (SEARXNG_SECRET) überschrieben.
  secret_key: "override-me-via-env"
  base_url: false
  image_proxy: false
  http_protocol_version: "1.1"
  method: "GET"
  # CORS-Header nur für FlowTalk-Backend nötig (das proxiet ohnehin).
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: false
  infinite_scroll: false
  results_on_new_tab: false

# Engines: Default-Set ist gut, wir lassen es überwiegend stehen.
# Bei Bedarf hier einzelne Engines deaktivieren/aktivieren.
engines:
  - name: wikipedia
    disabled: false
  - name: github
    disabled: false
  - name: stackoverflow
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: brave
    disabled: false
  - name: google
    disabled: false
